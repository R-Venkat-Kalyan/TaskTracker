<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | TaskTracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230b0f14%22/><path d=%22M30 30h40v10H30zM30 50h40v10H30zM30 70h25v10H30z%22 fill=%22%2388f572%22/><path d=%22M20 30h5v10h-5zM20 50h5v10h-5zM20 70h5v10h-5z%22 fill=%22%233b82f6%22/></svg>">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="bg-black text-white flex items-center justify-center w-screen h-screen overflow-hidden">

<div class="absolute inset-0 z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 rounded-full blur-[120px]"></div>
</div>

<div class="z-10 w-full max-w-md px-6">
    <div class="glass p-8 rounded-3xl shadow-2xl text-center border-t border-blue-500/30">

        <div class="mb-6 relative inline-block">
            <div class="absolute inset-0 animate-ping bg-blue-500/20 rounded-full"></div>
            <div class="relative bg-gray-800 p-5 rounded-full border border-gray-700">
                <i class="fa-solid fa-user-shield text-4xl text-blue-400"></i>
            </div>
        </div>

        <h1 class="text-3xl font-black mb-2 tracking-tight glow-text">Memory Leak ?</h1>
        <p class="text-gray-400 text-sm mb-8 italic">
            "It's okay to forget passwords, but don't forget the tracker or your pay will be deducted."
        </p>

        <div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl mb-8">
            <p class="text-red-400 text-xs font-bold uppercase tracking-widest mb-1">Security Protocol</p>
            <p class="text-gray-300 text-sm leading-relaxed">
                Self-service reset is disabled. You must <span class="text-white font-bold">contact your Manager</span> to verify your identity and restore access.
            </p>
        </div>

        <div class="space-y-4">
            <a href="/sign-in"
               class="block w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all active:scale-95 shadow-lg shadow-blue-500/20">
                Return to Login
            </a>
        </div>

    </div>

    <p class="text-center mt-8 text-gray-600 text-sm tracking-widest uppercase font-bold">
        TaskTracker
    </p>
</div>

</body>
</html>
