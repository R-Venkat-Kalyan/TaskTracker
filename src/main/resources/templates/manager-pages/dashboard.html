
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Dashboard</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>

  <style>
    .brand-text {
      font-family: 'Poppins', sans-serif;
      color: #88f572;
      letter-spacing: .5px;
    }
  </style>

  <th:block th:if="${successMessage}">
    <script th:inline="javascript">
      /*<![CDATA[*/
      window.onload = function () {
        alert(/*[[${successMessage}]]*/ '');
      };
      /*]]>*/
    </script>
  </th:block>

</head>

<body class="flex flex-col w-screen h-screen bg-white">

    <!-- Main Content -->
    <div class="flex-grow p-6 bg-gray-100">

      <!-- Welcome & Month -->
      <div class="px-4 sm:px-6 py-4 bg-blue-600 text-white rounded-t-xl flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-700">
          Welcome Manager <span th:text="${id}"></span> !!
        </h1>

        <form id="monthForm" th:action="@{/manager/dashboard}" method="get"
              class="flex items-center gap-2">
          <input type="month" name="month"
                 th:value="${month}"
                 class="rounded-md border border-white/30 bg-white/15 text-white px-2 focus:outline-none focus:ring-2 focus:ring-white/50" />

          <button class="px-3 rounded-md bg-white/15 hover:bg-white/25 border border-white/30">
            Load
          </button>

          <input type="hidden" name="_csrf" th:value="${_csrf.token}" th:if="${_csrf}"/>
        </form>
      </div>

      <!-- Your Details -->
      <div class="mt-6 bg-white shadow-md rounded-lg p-4">
        <h2 class="text-xl font-semibold text-gray-800">Your Details:</h2>
        <p><strong>Name:</strong> <span th:text="${name}"></span></p>
        <p><strong>Registered Mail:</strong> <span th:text="${mail}"></span></p>
        <p><strong>ID:</strong> <span th:text="${id}"></span></p>
        <p><strong>Project:</strong> <span th:text="${project}"></span></p>
      </div>

      <!-- Manager Quick Links -->
      <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        <a href="/manager/leave-tracker" class="bg-green-500 text-white p-4 rounded-lg shadow hover:bg-green-600">
          <i class="fa-solid fa-layer-group mr-2"></i>
          Total Story Points (Sum): <span th:text="${totalStoryPoints}"></span>
        </a>

        <a href="/manager/leave-tracker" class="bg-yellow-500 text-white p-4 rounded-lg shadow hover:bg-yellow-600">
          <i class="fa-solid fa-clock mr-2"></i>
          Total Effort in Hours (Sum): <span th:text="${totalEffortHours}"></span>
        </a>

        <a href="/manager/view-users" class="bg-purple-500 text-white p-4 rounded-lg shadow hover:bg-purple-600">
          <i class="fa-solid fa-users mr-2"></i>
          Total Employees Count: <span th:text="${employeeCount}"></span>
        </a>

        <a th:href="@{/manager/users-summary}"
           class="bg-blue-500 text-white p-4 rounded-lg shadow hover:bg-blue-600">
          <i class="fa-solid fa-chart-pie mr-2"></i>
          View Summary
        </a>

      </div>

      <!-- Manager Snapshot -->
      <div class="mt-6 bg-white shadow-md rounded-lg p-4">
        <h2 class="text-xl font-semibold text-gray-800">Team Monthly Snapshot</h2>
        <ul class="list-disc pl-6">
          <li>Total Working Days (All Employees Combined):
              <span th:text="${totalWorkingDays}"></span>
          </li>

          <li>Total Planned Leaves (All Employees):
              <span th:text="${totalPlannedLeaves}"></span>
          </li>
        </ul>
      </div>

    </div>


  <script>
    (function () {
      const el = document.getElementById('monthPicker');
      if (el && !el.value) {
        el.value = new Date().toISOString().slice(0, 7);
      }
    })();
  </script>

</body>
</html>
