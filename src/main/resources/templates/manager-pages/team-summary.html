<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Team Summary</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <link rel="icon" href="/assets/img/favicon.png"/>

    <style>
        .header-controls input[type="month"] { height: 2rem; font-size: .85rem; }
        .header-controls button { height: 2rem; font-size: .82rem; }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-blue-300 text-gray-900 min-h-screen flex items-center justify-center">

<div class="max-w-6xl w-full mx-auto py-8 px-4">
    <div class="bg-white shadow-xl rounded-xl overflow-hidden">

        <!-- Header -->
        <div class="px-4 sm:px-6 py-3 bg-blue-600 text-white rounded-t-xl flex items-center justify-between gap-3">
            <h2 class="text-2xl font-bold">
                <i class="fa-solid fa-chart-pie mr-2"></i> Team Summary
            </h2>

            <!-- Month filter -->
            <form th:action="@{/manager/users-summary}" method="get" class="header-controls flex items-center gap-2">
                <input type="month" name="month"
                       th:value="${month}"
                       class="rounded-md border border-white/30 bg-white/15 text-white px-2
                      focus:outline-none focus:ring-2 focus:ring-white/50"/>
                <button class="px-3 rounded-md bg-white/15 hover:bg-white/25 border border-white/30">Load</button>
            </form>
        </div>

        <!-- KPI row (team totals) -->
        <div class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-4 p-4">
            <div class="bg-indigo-100 rounded-lg p-4 border border-indigo-300">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-indigo-800">Team Story Points</div>
                        <div class="text-2xl font-bold text-indigo-900" th:text="${teamTotalSP}">0</div>
                    </div>
                    <i class="fa-solid fa-cubes text-indigo-700 text-2xl"></i>
                </div>
            </div>

            <div class="bg-amber-100 rounded-lg p-4 border border-amber-300">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-amber-800">Team Effort (hrs)</div>
                        <div class="text-2xl font-bold text-amber-900" th:text="${teamTotalHours}">0</div>
                    </div>
                    <i class="fa-solid fa-clock text-amber-700 text-2xl"></i>
                </div>
            </div>


            <div class="bg-blue-100 rounded-lg p-4 border border-blue-300">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-blue-800">Total Working Days</div>
                        <div class="text-2xl font-bold text-blue-900" th:text="${teamTotalWorkingDays}">0</div>
                    </div>
                    <i class="fa-solid fa-calendar-check text-blue-700 text-2xl"></i>
                </div>
            </div>

            <div class="bg-rose-100 rounded-lg p-4 border border-rose-300">
                <div class="flex items-center justify-between">
                    <div>
                        <div class="text-sm text-rose-800">Team Leave Days</div>
                        <div class="text-2xl font-bold text-rose-900" th:text="${teamTotalLeaveDays}">0</div>
                    </div>
                    <i class="fa-solid fa-umbrella-beach text-rose-700 text-2xl"></i>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto p-4">
            <table class="w-full table-auto rounded-lg border border-gray-300 text-sm">
                <thead>
                <tr class="bg-blue-500 text-white">
                    <th class="py-1.5 px-2 text-left border border-blue-600">Name</th>
                    <th class="py-1.5 px-2 text-left border border-blue-600">Employee ID</th>
                    <th class="py-1.5 px-2 text-right border border-blue-600">Story Points</th>
                    <th class="py-1.5 px-2 text-right border border-blue-600">Effort (hrs)</th>
                    <th class="py-1.5 px-2 text-right border border-blue-600">Working Days</th>
                    <th class="py-1.5 px-2 text-right border border-blue-600">Leave Days</th>
<!--                    <th class="py-1.5 px-2 text-center border border-blue-600">Actions</th>-->
                </tr>
                </thead>

                <tbody>
                <tr th:each="s : ${summaries}"
                    class="odd:bg-emerald-100 even:bg-emerald-200 text-gray-900 hover:bg-emerald-300/60 transition-colors">
                    <td class="py-1.5 px-2 border border-gray-500 border-r whitespace-nowrap"
                        th:text="${s.fullName}">John Doe</td>
                    <td class="py-1.5 px-2 border border-gray-500 border-r whitespace-nowrap"
                        th:text="${s.empId}">EMP-001</td>
                    <td class="py-1.5 px-2 border border-gray-500 border-r text-right"
                        th:text="${s.totalStoryPoints}">0</td>
                    <td class="py-1.5 px-2 border border-gray-500 border-r text-right"
                        th:text="${s.totalEffortHours}">0</td>
                    <td class="py-1.5 px-2 border border-gray-500 border-r text-right"
                        th:text="${s.totalWorkingDays}">0</td>
                    <td class="py-1.5 px-2 border border-gray-500 border-r text-right"
                        th:text="${s.totalLeaveDays}">0</td>
<!--                    <td class="py-1.5 px-2 border border-gray-500 text-center">-->
<!--                        <a class="text-blue-700 hover:underline"-->
<!--                           th:href="@{/manager/user-summary(userId=${s.userId}, month=${month})}">-->
<!--                            Details-->
<!--                        </a>-->
<!--                    </td>-->
                </tr>

                <tr th:if="${#lists.isEmpty(summaries)}">
                    <td colspan="7" class="py-3 px-2 text-center text-gray-600">No employees found.</td>
                </tr>
                </tbody>

                <tfoot>
                <tr class="bg-slate-100">
                    <td class="py-1.5 px-2 border-t border-gray-500 font-medium" colspan="2">Team Totals</td>
                    <td class="py-1.5 px-2 border-t border-gray-500 text-right font-semibold" th:text="${teamTotalSP}">0</td>
                    <td class="py-1.5 px-2 border-t border-gray-500 text-right font-semibold" th:text="${teamTotalHours}">0</td>
                    <td class="py-1.5 px-2 border-t border-gray-500 text-right font-semibold" th:text="${teamTotalWorkingDays}"></td>
                    <td class="py-1.5 px-2 border-t border-gray-500 text-right font-semibold" th:text="${teamTotalLeaveDays}">0</td>
                    <td class="py-1.5 px-2 border-t border-gray-500"></td>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script>
    (function(){
        const monthEl = document.querySelector('input[type="month"][name="month"]');
        if (monthEl && !monthEl.value) {
            monthEl.value = new Date().toISOString().slice(0, 7);
        }
    })();
</script>

</body>
</html>
