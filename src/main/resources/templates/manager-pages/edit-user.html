<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        function confirmUpdate() {

            const fullName = document.getElementById("fullName").value.trim();
            const org = document.getElementById("organisation").value.trim();
            const project = document.getElementById("project").value.trim();

            if (!fullName || !org || !project) {
                alert("Please fill all required fields.");
                return;
            }

            if (confirm("Are you sure you want to update this employee?")) {
                document.getElementById("editEmployeeForm").submit();
            }
        }
    </script>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-lg shadow">

    <h2 class="text-2xl font-bold mb-6 text-gray-700">Edit Employee</h2>

    <form id="editEmployeeForm"
          th:action="@{/manager/update-user}"
          method="post">

        <!-- Hidden ID for update -->
        <input type="hidden" name="id" th:value="${user.id}">

        <!-- Full Name -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Full Name</label>
            <input type="text"
                   id="fullName"
                   name="fullName"
                   th:value="${user.fullName}"
                   class="mt-2 block w-full p-3 border border-gray-300 rounded-md"
                   required>
        </div>

        <!-- Email (Readonly) -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email"
                   name="email"
                   th:value="${user.email}"
                   readonly
                   class="mt-2 block w-full p-3 border border-gray-300 bg-gray-100 text-gray-600 rounded-md cursor-not-allowed">
        </div>

        <!-- Employee ID (Readonly) -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Employee ID</label>
            <input type="text"
                   name="empId"
                   th:value="${user.empId}"
                   readonly
                   class="mt-2 block w-full p-3 border border-gray-300 bg-gray-100 text-gray-600 rounded-md cursor-not-allowed">
        </div>

        <!-- Organization -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Organization</label>
            <input type="text"
                   id="organisation"
                   name="organisation"
                   th:value="${user.organisation}"
                   class="mt-2 block w-full p-3 border border-gray-300 rounded-md"
                   required>
        </div>

        <!-- Project -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Project</label>
            <input type="text"
                   id="project"
                   name="project"
                   th:value="${user.project}"
                   class="mt-2 block w-full p-3 border border-gray-300 rounded-md"
                   required>
        </div>

        <!-- Role (Text Only) -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700">Role</label>

            <input type="text"
                   th:value="${user.role}"
                   readonly
                   class="mt-2 block w-full p-3 border border-gray-300 bg-gray-100 text-gray-600 rounded-md cursor-not-allowed">

            <!-- Hidden field to send role -->
            <input type="hidden" name="role" th:value="${user.role}">
        </div>

        <!-- Password -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password"
                   name="password"
                   th:value="${user.password}"
                   class="mt-2 block w-full p-3 border border-gray-300 rounded-md">
        </div>

        <!-- Buttons -->
        <div class="flex justify-between">

            <a th:href="@{/manager/dashboard}"
               class="px-5 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
                Cancel
            </a>

            <button type="button"
                    onclick="confirmUpdate()"
                    class="px-5 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                Update Employee
            </button>

        </div>

    </form>

</div>

</body>
</html>
