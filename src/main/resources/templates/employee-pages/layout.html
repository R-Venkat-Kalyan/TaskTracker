
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Employee Modules</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome (icons) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

    <!-- Google Font for brand -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230b0f14%22/><path d=%22M30 30h40v10H30zM30 50h40v10H30zM30 70h25v10H30z%22 fill=%22%2388f572%22/><path d=%22M20 30h5v10h-5zM20 50h5v10h-5zM20 70h5v10h-5z%22 fill=%22%233b82f6%22/></svg>">

    <!-- Success Message -->
    <th:block th:if="${successMessage}">
        <script th:inline="javascript">
            /*<![CDATA[*/
            window.onload = function () {
                alert(/*[[${successMessage}]]*/ '');
            };
            /*]]>*/
        </script>
    </th:block>

    <style>
        .brand-text {
            font-family: 'Poppins', sans-serif;
            color: #88f572; /* brand green */
            letter-spacing: .5px;
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-white">
<!-- Navbar -->
<nav class="bg-gray-900 fixed w-full z-30 top-0 start-0 border-b border-gray-700">
    <div class="max-w-screen-xl flex items-center justify-between mx-auto p-4">
        <!-- Styled TaskTracker brand -->
        <a href="/" class="flex items-center space-x-2 text-white no-underline">
            <h1 class="text-2xl brand-text">TaskTracker</h1>
            <span class="sr-only">Home</span>
        </a>

        <div class="flex md:order-2">
            <form th:action="@{/sign-out}" method="post" class="m-0 p-0">
                <button type="submit"
                        class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2">
                    Logout
                </button>
                <!-- Optional CSRF for Spring Security -->
                <input type="hidden" name="_csrf" th:value="${_csrf.token}" th:if="${_csrf}"/>
            </form>
        </div>
    </div>
</nav>

<!-- Main layout container (offset by navbar height) -->
<div class="flex flex-row mt-16 h-[calc(100vh-4rem)]">
    <!-- Sidebar (fixed) -->
    <aside
            class="fixed top-16 z-20 w-48 bg-gray-900 text-gray-400 h-[calc(100vh-4rem)]
             hidden md:flex flex-col">
        <div class="w-full px-2 py-2 flex-1 flex flex-col">
            <div class="flex flex-col items-center w-full mt-1">
                <!-- Dashboard -->
                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/employee/dashboard" aria-current="${activePage == 'dashboard'}">
                    <i class="fa-solid fa-chart-line w-6 h-6"></i>
                    <span class="ml-2 text-sm font-medium">Dashboard</span>
                </a>
                <!-- Milestone Tracker -->
                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/employee/milestone-tracker" aria-current="${activePage == 'milestone'}">
                    <i class="fa-solid fa-flag-checkered w-6 h-6"></i>
                    <span class="ml-2 text-sm font-medium">Milestone Tracker</span>
                </a>
                <!-- Holiday Tracker -->
                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/employee/leave-tracker" aria-current="${activePage == 'holidays'}">
                    <i class="fa-solid fa-calendar-days w-6 h-6"></i>
                    <span class="ml-2 text-sm font-medium">Leave Tracker</span>
                </a>
                <!-- Add Milestone Data -->
                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/employee/add-milestone-data" aria-current="${activePage == 'add-milestone'}">
                    <i class="fa-solid fa-plus w-6 h-6"></i>
                    <span class="ml-2 text-sm font-medium">Add Milestone Data</span>
                </a>
                <!-- Apply / Mark Leave -->
                <a class="flex items-center w-full h-12 px-3 mt-2 rounded hover:bg-gray-700 hover:text-gray-300"
                   href="/employee/add-leave" aria-current="${activePage == 'apply-leave'}">
                    <i class="fa-solid fa-plane-departure w-6 h-6"></i>
                    <span class="ml-2 text-sm font-medium">Apply / Mark Leave</span>
                </a>
            </div>

            <!-- Feedback Button (pinned at bottom of sidebar using mt-auto) -->
            <div class="mt-auto px-1 pb-3">
                <a class="relative flex items-center w-full h-12 px-3 rounded-lg bg-gradient-to-r from-blue-500 to-green-500 text-white font-bold shadow-md hover:shadow-xl transition-transform transform hover:scale-105"
                   href="/employee/feedback">
                    <i class="fa-solid fa-comment w-6 h-6"></i>
                    <span class="ml-2 text-sm font-medium">Feedback</span>
                    <span class="absolute top-0 right-0 mt-1 mr-1 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full animate-bounce">
              New!
            </span>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main Content (becomes the scroller) -->
    <main class="flex-1 md:ml-48 p-4 bg-white overflow-auto min-h-[calc(100vh-4rem)]">
        <!-- Optional max width for centering large pages -->
        <div class="max-w-7xl mx-auto">
            <div th:replace="${mainContent}"></div>
        </div>
    </main>
</div>

<!-- Tiny JS fallback (only sets month if somehow still empty) -->
<script>
    (function () {
        const el = document.getElementById('monthPicker');
        if (el && !el.value) {
            el.value = new Date().toISOString().slice(0, 7); // YYYY-MM
        }
    })();
</script>
</body>
</html>
