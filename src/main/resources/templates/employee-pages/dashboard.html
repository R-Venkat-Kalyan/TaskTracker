<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome (icons) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

    <!-- Google Font for brand -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet"/>

    <!-- Favicon -->
    <link href="assets/img/favicon.png" rel="icon"/>

    <!-- Success Message -->
    <th:block th:if="${successMessage}">
        <script th:inline="javascript">
            /*<![CDATA[*/
            window.onload = function () {
                alert(/*[[${successMessage}]]*/ '');
            };
            /*]]>*/
        </script>
    </th:block>

    <style>
        .brand-text {
            font-family: 'Poppins', sans-serif;
            color: #88f572; /* brand green */
            letter-spacing: .5px;
        }
    </style>
</head>

<body class="flex flex-col w-screen h-screen bg-white">

    <!-- Main Content -->
    <div class="flex-grow p-6 bg-gray-100">

        <!-- Welcome + Month POST form (now month defaults to current month) -->
        <div class="px-4 sm:px-6 py-4 bg-blue-600 text-white rounded-t-xl flex items-center justify-between">

            <h1 class="text-2xl font-bold text-gray-700 text-center md:text-left">
                Welcome <span th:text="${id}"></span> !!
            </h1>

            <!-- POST to a new route with selected month -->
            <form class="header-controls flex items-center gap-2" th:action="@{/employee/dashboard}" method="get">

                <input type="month" name="month"
                       th:value="${month}"
                       class="rounded-md border border-white/30 bg-white/15 text-white px-2 focus:outline-none focus:ring-2 focus:ring-white/50">

                <button class="px-3 rounded-md bg-white/15 hover:bg-white/25 border border-white/30">
                    Load
                </button>

            </form>
        </div>

        <!-- Your Details -->
        <div class="mt-6 bg-white shadow-md rounded-lg p-4">
            <h2 class="text-xl font-semibold text-gray-800">Your Details:</h2>
            <p><strong>Name:</strong> <span th:text="${name}"></span></p>
            <p><strong>Registered Mail:</strong> <span th:text="${mail}"></span></p>
            <p><strong>ID:</strong> <span th:text="${id}"></span></p>
            <p><strong>Project:</strong> <span th:text="${project}"></span></p>
        </div>

        <!-- Quick Links (point these to your actual routes) -->
        <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="/employee/milestone-tracker"
               class="bg-green-500 text-white p-4 rounded-lg shadow hover:bg-green-600">
                Your Story Points: <b><i><span th:text="${storyPoints}"></span></i></b>
            </a>
            <a href="/employee/milestone-tracker"
               class="bg-yellow-500 text-white p-4 rounded-lg shadow hover:bg-yellow-600">
                Your Effort in Hours: <b><i><span th:text="${effortHours}"></span></i></b>
            </a>
            <a href="javascript:void(0)" class="bg-purple-500 text-white p-4 rounded-lg shadow hover:bg-purple-600">
                Planning New Module Here !!
            </a>
            <a href="/employee/change-password" class="bg-blue-500 text-white p-4 rounded-lg shadow hover:bg-blue-600">
                Update Password
            </a>
        </div>

        <!-- Monthly Work Snapshot -->
        <div class="mt-6 bg-white shadow-md rounded-lg p-4">
            <h2 class="text-xl font-semibold text-gray-800">Monthly Work Snapshot</h2>
            <ul class="list-disc pl-6">
                <li>Working days this month: <span th:text="${workingDays}"></span></li>
                <li>Planned leave days this month: <span th:text="${plannedLeaveDays}"></span></li>
            </ul>
        </div>

    </div>


<!-- Tiny JS fallback (only sets month if somehow still empty) -->
<script>
    (function () {
        const el = document.getElementById('monthPicker');
        if (el && !el.value) {
            el.value = new Date().toISOString().slice(0, 7); // YYYY-MM
        }
    })();
</script>

</body>
</html>
