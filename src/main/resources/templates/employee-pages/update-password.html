<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TaskTracker • Update Password</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/img/favicon.png" rel="icon"/>

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

<!-- Container -->
<div class="flex justify-center items-center min-h-screen p-4 bg-gray-100">
    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-6 relative overflow-hidden">

        <!-- Header -->
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">
            Update Password
        </h2>

        <p class="text-sm text-gray-600 text-center mb-6">
            Keep your <span class="font-semibold">TaskTracker</span> account secure by choosing a strong password.
        </p>

        <!-- Update Password Form -->
        <form action="/employee/update-password" method="POST" class="space-y-4" id="updatePasswordForm">
            <!-- If using Spring Security, include CSRF -->
            <!-- <input type="hidden" name="_csrf" value="${_csrf.token}"> -->

            <!-- New Password -->
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-700">New Password</label>
                <div class="relative mt-1">
                    <input type="password" id="newPassword" name="newPassword" placeholder="Choose a strong password"
                           class="w-full pr-10 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           required minlength="8" autocomplete="new-password" />
                    <button type="button" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                            onclick="toggleVisibility('newPassword', this)" aria-label="Show/Hide new password">
                        <i data-lucide="eye"></i>
                    </button>
                </div>

                <!-- Password hint / strength -->
                <p class="text-xs text-gray-500 mt-2">
                    Use at least 8 characters, including upper & lower case, a number, and a symbol.
                </p>

                <!-- Strength meter (very light hint) -->
                <div class="mt-2 h-2 bg-gray-200 rounded">
                    <div id="strengthBar" class="h-2 bg-red-400 rounded transition-all" style="width: 15%;"></div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Confirm New Password</label>
                <div class="relative mt-1">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password"
                           class="w-full pr-10 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           required autocomplete="new-password" />
                    <button type="button" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700"
                            onclick="toggleVisibility('confirmPassword', this)" aria-label="Show/Hide confirm password">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
                <p id="matchHint" class="text-xs mt-1"></p>
            </div>

            <!-- Submit Button -->
            <div class="text-center pt-2">
                <button type="submit"
                        class="w-full bg-gradient-to-r from-blue-500 to-green-500 text-white font-semibold py-2 px-4 rounded-lg shadow-md hover:shadow-lg hover:from-blue-600 hover:to-green-600 transition-transform transform hover:scale-105">
                    Update Password
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Initialize icons
    lucide.createIcons();

    // Toggle visibility helper
    function toggleVisibility(id, btn) {
        const input = document.getElementById(id);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.innerHTML = isPassword ? '<i data-lucide="eye-off"></i>' : '<i data-lucide="eye"></i>';
        lucide.createIcons();
    }

    // Tiny strength estimator (client-side hint only)
    const newPwd = document.getElementById('newPassword');
    const strengthBar = document.getElementById('strengthBar');
    newPwd.addEventListener('input', () => {
        const v = newPwd.value || '';
        let score = 0;
        if (v.length >= 8) score += 1;
        if (/[A-Z]/.test(v)) score += 1;
        if (/[a-z]/.test(v)) score += 1;
        if (/\d/.test(v)) score += 1;
        if (/[^A-Za-z0-9]/.test(v)) score += 1;

        const pct = [15, 30, 50, 70, 100][Math.max(0, score - 1)] || 15;
        strengthBar.style.width = pct + '%';
        strengthBar.className =
            'h-2 rounded transition-all ' +
            (score <= 2 ? 'bg-red-400' : score === 3 ? 'bg-yellow-400' : 'bg-green-500');
    });

    // Confirm match hint
    const confirmPwd = document.getElementById('confirmPassword');
    const matchHint = document.getElementById('matchHint');
    function checkMatch() {
        if (!confirmPwd.value) {
            matchHint.textContent = '';
            return;
        }
        if (newPwd.value === confirmPwd.value) {
            matchHint.textContent = 'Passwords match ✔';
            matchHint.className = 'text-xs mt-1 text-green-600';
        } else {
            matchHint.textContent = 'Passwords do not match';
            matchHint.className = 'text-xs mt-1 text-red-600';
        }
    }
    newPwd.addEventListener('input', checkMatch);
    confirmPwd.addEventListener('input', checkMatch);

    // Prevent submit if mismatch (client-side)
    document.getElementById('updatePasswordForm').addEventListener('submit', (e) => {
        if (newPwd.value !== confirmPwd.value) {
            e.preventDefault();
            matchHint.textContent = 'Passwords do not match';
            matchHint.className = 'text-xs mt-1 text-red-600';
            confirmPwd.focus();
        }
    });
</script>
</body>
</html>
