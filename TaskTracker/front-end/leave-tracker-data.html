
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Applied Leaves</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome (icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Favicon (optional) -->
  <link rel="icon" href="assets/img/favicon.png">

  <style>
    /* Tooltips – your pattern, kept intact */
    .tooltip { position: relative; display: inline-block; }
    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
      background-color: #333; color: #fff; padding: 4px 8px; border-radius: 4px;
      white-space: nowrap; font-size: 0.75rem; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .tooltip:hover::after { opacity: 1; }

    /* Compact header controls */
    .header-controls input[type="month"] { height: 2rem; font-size: .85rem; }
    .header-controls button { height: 2rem; font-size: .82rem; }
  </style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-blue-300 text-gray-900 min-h-screen flex items-center justify-center">

  <div class="max-w-6xl w-full mx-auto py-8 px-4">
    <div class="bg-white shadow-xl rounded-xl overflow-hidden">

      <!-- Header -->
      <div class="px-4 sm:px-6 py-3 bg-blue-600 text-white rounded-t-xl flex items-center justify-between gap-3">
        <h2 class="text-2xl font-bold">
          <i class="fa-solid fa-calendar-days mr-2"></i> Applied Leaves
        </h2>

        <!-- Month filter (defaults to current month) -->
        <form th:action="@{/me/holidays}" method="get" class="header-controls flex items-center gap-2">
          <input type="month" name="month"
                 th:value="${month != null && !#strings.isEmpty(month) ? month : #temporals.format(#temporals.createNow(), 'yyyy-MM')}"
                 class="rounded-md border border-white/30 bg-white/15 text-white px-2
                        focus:outline-none focus:ring-2 focus:ring-white/50">
          <button class="px-3 rounded-md bg-white/15 hover:bg-white/25 border border-white/30">Load</button>
        </form>
      </div>

      <!-- Leaves Table -->
      <div class="overflow-x-auto p-4">
        <table class="w-full table-auto rounded-lg border border-gray-300 text-sm">

          <!-- Head -->
          <thead>
            <tr class="bg-blue-500 text-white">
              <th class="py-1.5 px-2 text-left border border-blue-600">Start</th>
              <th class="py-1.5 px-2 text-left border border-blue-600">End</th>
              <th class="py-1.5 px-2 text-right border border-blue-600">Total</th>
              <th class="py-1.5 px-2 text-left border border-blue-600">Type</th>
              <th class="py-1.5 px-2 text-center border border-blue-600">Actions</th>
            </tr>
          </thead>

          <!-- Body (green highlight rows + light, visible borders) -->
          <tbody>
            <tr th:each="lv : ${leaves}"
                class="odd:bg-emerald-100 even:bg-emerald-200 text-gray-900 hover:bg-emerald-300/60 transition-colors">
              
              <td class="py-1.5 px-2 border border-gray-500 border-r whitespace-nowrap"
                  th:text="${lv.startDate}">2026-04-10</td>

              <td class="py-1.5 px-2 border border-gray-500 border-r whitespace-nowrap"
                  th:text="${lv.endDate}">2026-04-12</td>

              <td class="py-1.5 px-2 border border-gray-500 border-r text-right whitespace-nowrap"
                  th:text="${lv.totalDays}">3</td>

              <td class="py-1.5 px-2 border border-gray-500 border-r whitespace-nowrap">
                <span th:text="${lv.type}">Planned</span>
              </td>

              <!-- ACTIONS: Edit / Delete -->
              <td class="py-1.5 px-2 border border-gray-500 text-center whitespace-nowrap">
                <a th:href="@{/me/edit-leave/{id}(id=${lv.id})}" class="tooltip mx-1" data-tooltip="Edit">
                  <i class="fas fa-edit text-base text-gray-900"></i>
                </a>
                <a th:href="@{/me/delete-leave/{id}(id=${lv.id})}" class="tooltip mx-1" data-tooltip="Delete">
                  <i class="fas fa-trash-alt text-base text-red-700"></i>
                </a>
              </td>
            </tr>
          </tbody>

          <!-- Summary -->
          <tfoot>
            <tr class="bg-slate-100">
              <td class="py-1.5 px-2 border-t border-gray-500 font-medium" colspan="2">Total Leave Days </td>
              <td id="sumTotal" class="py-1.5 px-2 border-t border-gray-500 text-right font-semibold"
                  th:text="${sumTotalDays}">0</td>
              <td class="py-1.5 px-2 border-t border-gray-500" colspan="2"></td>
            </tr>
          </tfoot>

        </table>
      </div>

    </div>
  </div>

  <!-- Small fallbacks -->
  <script>
    (function(){
      // Default month if missing
      const monthEl = document.querySelector('input[type="month"][name="month"]');
      if (monthEl && !monthEl.value) monthEl.value = new Date().toISOString().slice(0, 7);

      // Client-side total if server didn't compute
      const tfootCell = document.getElementById('sumTotal');
      if (!tfootCell) return;
      if (tfootCell.textContent.trim() !== '0') return;

      const rows = document.querySelectorAll('tbody tr');
      let total = 0;
      rows.forEach(r => total += Number(r.children[2]?.textContent?.trim() || 0));
      if (isFinite(total)) tfootCell.textContent = total.toString();
    })();
  </script>

</body>
</html>
