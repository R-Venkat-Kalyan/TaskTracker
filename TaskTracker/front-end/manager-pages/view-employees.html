
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Employees</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Favicon -->
    <link href="assets/img/favicon.png" rel="icon">

    <style>
        .tooltip { position: relative; display: inline-block; }
        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background-color: #333; color: #fff; padding: 5px 10px; border-radius: 5px;
            white-space: nowrap; font-size: 0.75rem; opacity: 0; transition: opacity .2s;
            pointer-events: none;
        }
        .tooltip:hover::after { opacity: 1; }
        th, td { white-space: nowrap; }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-blue-300 text-gray-900 min-h-screen flex items-center justify-center">

    <div class="max-w-7xl w-full mx-auto py-8 px-4">
        <div class="bg-white shadow-xl rounded-xl overflow-hidden">

            <!-- Header -->
            <div class="px-4 sm:px-6 py-4 bg-blue-600 text-white rounded-t-xl flex items-center justify-between">
                <h2 class="text-2xl sm:text-3xl font-bold">
                    <i class="fas fa-users"></i> View Employees
                </h2>

                <a href="/manager/add-employee"
                   class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md bg-white text-blue-700 hover:bg-gray-100 border border-white/30">
                    <i class="fa fa-plus"></i> Add Employee
                </a>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto p-4 sm:p-6">
                <table class="w-full bg-white rounded-lg border border-gray-300">
                    <thead>
                        <tr class="bg-blue-500 text-white text-sm">
                            <th class="py-2 px-3 text-left">Full Name</th>
                            <th class="py-2 px-3 text-left">Email</th>
                            <th class="py-2 px-3 text-left">Employee ID</th>
                            <th class="py-2 px-3 text-left">Organisation</th>
                            <th class="py-2 px-3 text-left">Project</th>
                            <th class="py-2 px-3 text-left">Role</th>
                            <th class="py-2 px-3 text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody class="text-sm">
                        <tr th:each="emp : ${employees}" class="hover:bg-gray-100 transition">
                            <td class="py-2 px-3 border border-gray-200" th:text="${emp.fullName}">John Doe</td>
                            <td class="py-2 px-3 border border-gray-200" th:text="${emp.email}">john@mail.com</td>
                            <td class="py-2 px-3 border border-gray-200" th:text="${emp.empId}">EMP001</td>
                            <td class="py-2 px-3 border border-gray-200" th:text="${emp.organisation}">Cognizant</td>
                            <td class="py-2 px-3 border border-gray-200" th:text="${emp.project}">Payments</td>
                            <td class="py-2 px-3 border border-gray-200 capitalize" th:text="${emp.role}">developer</td>

                            <!-- ACTIONS -->
                            <td class="py-2 px-3 border border-gray-200 text-center">
                                <!-- Duplicate / Save As -->
                                <a th:href="@{'/manager/add-employee'(duplicate=${emp.id})}"
                                   class="text-blue-600 tooltip mx-2 hover:text-blue-800 transition"
                                   data-tooltip="Duplicate / Save As">
                                    <i class="fas fa-clone text-lg"></i>
                                </a>

                                <!-- Edit -->
                                <a th:href="@{'/manager/edit-employee/' + ${emp.id}}"
                                   class="text-green-600 tooltip mx-2 hover:text-green-800 transition"
                                   data-tooltip="Edit">
                                    <i class="fas fa-edit text-lg"></i>
                                </a>

                                <!-- Delete -->
                                <a th:href="@{'/manager/delete-employee/' + ${emp.id}}"
                                   class="text-red-600 tooltip mx-2 hover:text-red-800 transition"
                                   data-tooltip="Delete"
                                   onclick="return confirm('Delete this employee?');">
                                    <i class="fas fa-trash-alt text-lg"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>
    </div>

</body>
</html>
